#version=RHEL8
# Use graphical install
graphical

%packages
#1050e的：1050e/repodata/normal.xml
@^graphical-server-environment
@development

%end

# Keyboard layouts
keyboard --xlayouts='cn'
# System language
lang zh_CN.UTF-8

# Network information
network  --bootproto=static --device=NETWORK_CARD --gateway='127.0.0.1' --ip=NETWORK_IP --nameserver='144.144.144.144' --netmask=255.255.252.0 --ipv6=auto --activate
network  --hostname=localhost.localdomain

# Use CDROM installation media
#cdrom

# Run the Setup Agent on first boot
firstboot --enable

ignoredisk --only-use=SYSTEM_DISK
autopart
# Partition clearing information
clearpart --all --initlabel --drives=SYSTEM_DISK

# System timezone
timezone Asia/Beijing --isUtc

# Root password
rootpw --iscrypted $6$mf1ZWUnMu1laJnHB$ikzuka1AFMKlyu04RBxhhQcBnzcH/fiohibacBGIBWcxeko4GYkLDrbsJbQfGeWbAffgzT4u9qXLvzWCoJLzo0

#%addon com_redhat_kdump --enable --reserve-mb='auto'
%addon com_redhat_kdump --disable --reserve-mb='512'

%end

%anaconda
pwpolicy root --minlen=8 --minquality=1 --notstrict --nochanges --emptyok
pwpolicy user --minlen=6 --minquality=1 --notstrict --nochanges --emptyok
pwpolicy luks --minlen=6 --minquality=1 --notstrict --nochanges --notempty
%end
reboot